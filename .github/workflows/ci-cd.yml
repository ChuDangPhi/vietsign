name: VietSign CI - Build and Push

on:
  push:
    branches: ["main"] # Tự động chạy khi push vào nhánh main
    paths:
      - "backend/**"
      - "frontend/**"
      - "k8s/**" # Chạy khi có thay đổi cấu hình hạ tầng

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Trích xuất mã định danh commit ngắn (ví dụ: a1b2c3d)
      - name: Get Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # 1. Build & Push Backend
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
            ${{ secrets.DOCKERHUB_USERNAME }}/vietsign-be:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/vietsign-be:v1.0.1
            ${{ secrets.DOCKERHUB_USERNAME }}/vietsign-be:${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2. Build & Push Frontend
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
            ${{ secrets.DOCKERHUB_USERNAME }}/vietsign-fe:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/vietsign-fe:v1.0.1
            ${{ secrets.DOCKERHUB_USERNAME }}/vietsign-fe:${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
