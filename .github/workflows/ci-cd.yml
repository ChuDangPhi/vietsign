name: VietSign CI - Build and Push

on:
  push:
    branches: ["main"] # Tự động chạy khi push vào nhánh main
    paths:
      - "backend/**"
      - "frontend/**"
      - "k8s/**"
      - ".github/workflows/**"
  workflow_dispatch: # Cho phép chạy thủ công từ tab Actions

permissions:
  actions: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Get Backend Version
        id: be_version
        run: echo "version=$(node -p "require('./backend/package.json').version")" >> $GITHUB_OUTPUT

      - name: Get Frontend Version
        id: fe_version
        run: echo "version=$(node -p "require('./frontend/package.json').version")" >> $GITHUB_OUTPUT

      # Extract metadata (tags, labels) for Docker
      - name: Extract Backend metadata
        id: meta-be
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/vietsign-be
          tags: |
            type=raw,value=latest
            type=raw,value=v${{ steps.be_version.outputs.version }}
            type=raw,value=${{ steps.vars.outputs.sha_short }}

      # 1. Build & Push Backend
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-be.outputs.tags }}
          labels: ${{ steps.meta-be.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      # Extract metadata for Frontend
      - name: Extract Frontend metadata
        id: meta-fe
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/vietsign-fe
          tags: |
            type=raw,value=latest
            type=raw,value=v${{ steps.fe_version.outputs.version }}
            type=raw,value=${{ steps.vars.outputs.sha_short }}

      # 2. Build & Push Frontend
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-fe.outputs.tags }}
          labels: ${{ steps.meta-fe.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      # 3. Cleanup old workflow runs
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        if: always()
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 2
