services:
  db:
    image: mysql:8.0
    container_name: vietsign_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: vietsignschool
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Map thư mục chứa file .sql vào đây để tự động chạy khi khởi tạo DB lần đầu
      - ./database:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vietsign_backend
    ports:
      - "8080:5000"
    environment:
      PORT: 5000
      JWT_SECRET: vietsign-dev-secret-change-me
      JWT_EXPIRES_IN: 1d
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: vietsignschool
      DB_PORT: 3306
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: vulinh3122001
      MINIO_BUCKET_NAME: vietsign
      MINIO_USE_SSL: "false"
      AI_MODEL_BASE_URL: https://vietsign.ibme.edu.vn/vsl-api
      AI_MODEL_TIMEOUT_MS: 20000
      AI_MODEL_RETRY_COUNT: 1
      AI_MODEL_RETRY_DELAY_MS: 250
      AI_MODEL_MAX_FILE_SIZE_BYTES: 10485760
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.local
    container_name: vietsign_frontend
    ports:
      - "3000:3000"
    environment:
      # Configurations are now loaded from public/config.js (mapped from frontend-configmap.yaml concept)
      - NODE_ENV=development
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  minio:
    image: minio/minio
    container_name: vietsign_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: vulinh3122001
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  db_data:
  minio_data:
