apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vietsign-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  # tls:
  #   - hosts:
  #       - vietsign.ibme.edu.vn
  #     secretName: vietsign-tls-secret
  rules:
    - http:
        paths:
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: vietsign-backend-service
                port:
                  number: 5000
          - path: /minio-api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: minio
                port:
                  number: 9000
          - path: /minio-console(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: minio
                port:
                  number: 9001
          - path: /()(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: vietsign-frontend-service
                port:
                  number: 80
