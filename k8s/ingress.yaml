apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vietsign-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: vietsign.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: vietsign-backend-service
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vietsign-frontend-service
                port:
                  number: 80
          - path: /minio-api
            pathType: Prefix
            backend:
              service:
                name: minio
                port:
                  number: 9000
          - path: /minio-console
            pathType: Prefix
            backend:
              service:
                name: minio
                port:
                  number: 9001
